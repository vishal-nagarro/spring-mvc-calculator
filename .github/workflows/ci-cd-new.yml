name: CI/CD for Spring MVC Calculator

on:
  push:
    branches:
      - dev
      - 'feature-*'
  pull_request:
    branches:
      - dev
      - 'feature-*'
  workflow_dispatch:
  schedule:
    # At 11:30 UTC on Wednesdays and Fridays (5:00 PM IST)
    - cron: '30 11 * * 3,5'

jobs:
  build-test-artifact:
    name: Build, Test, Report, and Artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      MAVEN_OPTS: -Dmaven.repo.local=.m2/repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Build with Maven (test & package)
        run: mvn -B package --file pom.xml

      - name: Run JaCoCo and generate coverage report
        run: mvn jacoco:report

      - name: Generate Surefire HTML test report
        run: mvn surefire-report:report

      - name: Upload JAR/WAR binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spring-mvc-app-${{ github.ref_name }}-${{ github.sha }}
          path: |
            target/*.jar
            target/*.war
          retention-days: 14

      - name: Upload Surefire test reports
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report-${{ github.ref_name }}-${{ github.sha }}
          path: target/site/surefire-report.html
          retention-days: 14

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ github.ref_name }}-${{ github.sha }}
          path: target/site/jacoco/
          retention-days: 14

      # Optionally, annotate test failures or summarize coverage here (extensions possible)

# End of workflow file
