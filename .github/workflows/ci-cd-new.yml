name: CI/CD Pipeline - Spring MVC Calculator

on:
  push:
    branches:
      - dev
      - 'feature-*'
  pull_request:
    branches:
      - dev
      - 'feature-*'
  workflow_dispatch:

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean compile

      - name: Run tests
        run: mvn test

      - name: Generate JaCoCo code coverage report
        run: mvn jacoco:report

      - name: Package application (JAR/WAR)
        run: mvn package

      - name: Upload Application Artifact (JAR/WAR)
        uses: actions/upload-artifact@v3
        with:
          name: app-artifact
          path: |
            target/*.jar
            target/*.war

      - name: Upload Test Reports
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: jacoco-report
          path: target/site/jacoco/
