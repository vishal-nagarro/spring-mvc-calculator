name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - 'feature-*'
  pull_request:
    branches:
      - dev
      - 'feature-*'

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Java 11 environment
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 11

      # Build the application
      - name: Build (mvn clean compile)
        run: mvn clean compile

      # Run JUnit Tests
      - name: Test (mvn test)
        run: mvn test

      # Generate JaCoCo Coverage Report
      - name: Generate Code Coverage Report (JaCoCo)
        run: mvn jacoco:report

      # Package the application (JAR/WAR)
      - name: Package (mvn package)
        run: mvn package

      # Upload JAR/WAR artifact
      - name: Upload packaged artifact (JAR/WAR)
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            target/*.jar
            target/*.war

      # Upload test reports
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

      # Upload JaCoCo code coverage reports
      - name: Upload code coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
